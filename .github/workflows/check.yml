name: Check

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Lint Python
        run: pip install ruff && ruff check backend/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn[standard] websockets aiosqlite "sqlalchemy[asyncio]" \
            pydantic-settings python-dotenv httpx aiofiles slowapi phue2 fauxmo soco \
            python-json-logger edge-tts psutil mss python-multipart pytest pytest-asyncio \
            numpy

      - name: Run tests
        run: python -m pytest tests/ -v
        env:
          APP_ENV: testing

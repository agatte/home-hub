name: Check

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Lint Python
        run: pip install ruff && ruff check backend/

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check Svelte
        run: cd frontend-svelte && npm ci && npm run check

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn[standard] websockets aiosqlite "sqlalchemy[asyncio]" \
            pydantic-settings python-dotenv httpx aiofiles slowapi phue2 fauxmo \
            pytest pytest-asyncio

      - name: Run tests
        run: python -m pytest tests/test_automation_engine.py -v
        env:
          APP_ENV: testing

name: Check

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Lint Python
        run: pip install ruff && ruff check backend/

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          pip install fastapi uvicorn[standard] websockets aiosqlite "sqlalchemy[asyncio]" \
            pydantic-settings python-dotenv httpx aiofiles slowapi phue2 fauxmo soco \
            python-json-logger edge-tts psutil mss python-multipart pytest pytest-asyncio \
            numpy

      - name: Run tests
        run: python -m pytest tests/ -v
        env:
          APP_ENV: testing

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-svelte
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Run vitest unit tests
        run: npm run test:unit

      # Playwright e2e tests require a live backend + frontend; not run in
      # CI yet. Run locally with `npm run test:e2e` after starting the dev
      # server, or against a deployed instance via PLAYWRIGHT_BASE_URL.
